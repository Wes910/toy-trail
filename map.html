<script>
// Inline Supabase client for public pages
const SUPABASE_URL = "https://pecbjwvmuurzrvjoukwd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_aAMpr1-Ic86aDDaOmue9aQ_UGSygBFR";

const supabaseClient = {
  async from(table) {
    return {
      select: (cols = "*") => ({
        order: (col, opts) => ({
          async then(resolve) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&order=${col}.${opts.ascending ? "asc" : "desc"}`, {
              headers: { apikey: SUPABASE_ANON_KEY }
            });
            const data = await res.json();
            resolve({ data: res.ok ? data : null, error: res.ok ? null : { message: "Query failed" } });
          }
        })
      })
    };
  }
};
</script>
<script src="js/config.js"></script>
<script src="js/map.js"></script>
</body>
